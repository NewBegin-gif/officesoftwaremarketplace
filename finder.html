  function back(fn, label){ var b = h('<button class="f-back">' + (label || '← Back') + '</button>'); b.addEventListener('click', fn); return b; }
  function render(qhtml, nodes){
    root.innerHTML = qhtml;
    var wrap = h('<div class="f-opts"></div>');
    nodes.forEach(function(n){ wrap.appendChild(n); });
    root.appendChild(wrap);
  }
  step1();
})();

  </script>
</body>
